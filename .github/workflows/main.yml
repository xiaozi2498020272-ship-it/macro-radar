name: Daily Macro Radar

on:
  schedule:
    # 这里的 cron 使用 UTC 时间，0 0 * * * 代表 UTC 0点，即北京时间早上 8 点
    - cron: '0 0 * * *'
  workflow_dispatch: # 这个指令允许你在网页上手动点击按钮触发运行，方便测试

jobs:
  run-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run macro radar
        run: |
          python macro.py
