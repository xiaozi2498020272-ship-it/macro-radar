name: 尾盘战法狙击 (14:40)

on:
  schedule:
    # 每天 UTC 时间 06:10 (对应北京时间 14:10) 触发排队，周一至周五
    - cron: '10 6 * * 1-5'
  workflow_dispatch: 

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # 升级到 v4

      - name: Set up Python
        uses: actions/setup-python@v5 # 升级到 v5
        with:
          python-version: '3.10'

      - name: 设置北京时区
        run: |
          sudo timedatectl set-timezone Asia/Shanghai
          date

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas requests

      - name: 执行尾盘脚本
        # 这里已严格更正为 macro.py
        run: python macro.py
