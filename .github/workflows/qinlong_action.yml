name: 游资擒龙早盘狙击 (9:25)

on:
  schedule:
    - cron: '25 1 * * 1-5'  # 对应北京时间周一至周五 09:25
  workflow_dispatch: # 允许手动点击按钮运行测试

jobs:
  run-strategy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # 升级到 v4

      - name: Set up Python
        uses: actions/setup-python@v5  # 升级到 v5
        with:
          python-version: '3.10'

      - name: 设置北京时区
        run: |
          sudo timedatectl set-timezone Asia/Shanghai
          date

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas requests

      - name: 执行擒龙 Python 脚本
        # 注意这里改成了你上传的文件名
        run: python qinlong.py
