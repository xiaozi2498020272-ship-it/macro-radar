name: 游资擒龙早盘狙击 (9:25)

on:
  schedule:
    # 每天 UTC 时间 01:00 (对应北京时间 09:00) 触发排队，周一至周五
    - cron: '00 1 * * 1-5'
  workflow_dispatch: # 允许手动点击按钮运行测试

jobs:
  run-strategy:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置 Python 3.10 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 设置北京时区 (解决时差问题)
      run: |
        sudo timedatectl set-timezone Asia/Shanghai
        date

    - name: 安装量化依赖库
      run: |
        python -m pip install --upgrade pip
        pip install akshare pandas requests

    - name: 执行擒龙 Python 脚本
      # 注意这里改成了你上传的文件名
      run: python qinlong.py
